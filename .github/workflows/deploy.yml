name: Deploy to cPanel

on:
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Upload files via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy Laravel app to candoo
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST || vars.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          protocol: ftp
          server-dir: ./
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.example
            **/README.md
            **/docs/**
            **/public/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/bootstrap/cache/*.php
          dangerous-clean-slate: false

      - name: Deploy public directory to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST || vars.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./public/
          exclude: |
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
          dangerous-clean-slate: false

