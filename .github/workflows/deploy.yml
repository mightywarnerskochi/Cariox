name: Deploy to cPanel

on:
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Upload files via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # FTP-Deploy-Action requires non-empty `server`. Set in GitHub:
      # Settings → Secrets and variables → Actions → Secrets (or Variables):
      #   FTP_HOST or FTP_SERVER — hostname or IP of your FTP server
      #   FTP_USERNAME, FTP_PASSWORD — FTP credentials
      - name: Require FTP server hostname
        env:
          FTP_SERVER_VALUE: ${{ secrets.FTP_HOST || secrets.FTP_SERVER || vars.FTP_HOST }}
        run: |
          if [ -z "$FTP_SERVER_VALUE" ]; then
            echo "::error::No FTP host configured. Add repository secret FTP_HOST or FTP_SERVER (or variable FTP_HOST) with your FTP server hostname."
            exit 1
          fi

      - name: Deploy Laravel app to cariox
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST || secrets.FTP_SERVER || vars.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          protocol: ftp
          server-dir: ./
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.example
            **/README.md
            **/docs/**
            **/public/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/bootstrap/cache/*.php
          dangerous-clean-slate: false

      - name: Deploy public directory to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST || secrets.FTP_SERVER || vars.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./public/
          exclude: |
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
          dangerous-clean-slate: false

